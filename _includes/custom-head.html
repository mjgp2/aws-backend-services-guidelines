<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    if (!window.mermaid) return;

    mermaid.initialize({
      startOnLoad: false,
      securityLevel: "loose",
      theme: "default"
    });

    const blocks = document.querySelectorAll("pre code.language-mermaid");

    for (const block of blocks) {
      const wrapper = block.closest(".highlighter-rouge") || block.parentElement;
      if (!wrapper || wrapper.dataset.mermaidRendered === "true") continue;

      const container = document.createElement("div");
      container.className = "mermaid";
      container.textContent = block.textContent || "";

      wrapper.dataset.mermaidRendered = "true";
      wrapper.replaceWith(container);
    }

    mermaid.run({
      nodes: document.querySelectorAll(".mermaid")
    });

    for (const svg of document.querySelectorAll(".mermaid svg")) {
      svg.removeAttribute("width");
      svg.removeAttribute("height");
      svg.style.width = "100%";
      svg.style.maxWidth = "100%";
      svg.style.height = "auto";
      svg.style.display = "block";
    }
  });
</script>
